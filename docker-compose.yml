services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails server -b 0.0.0.0 -p 4000"
    volumes:
      - ./api:/app
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/cram_development
      REDIS_URL: redis://redis:6379/0
      FRONTEND_URL: http://localhost:5173
      SECRET_KEY_BASE: development_secret_key_base
      DEVISE_JWT_SECRET_KEY: development_jwt_secret_key
    depends_on:
      - db
      - redis

  sidekiq:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    command: bundle exec sidekiq
    volumes:
      - ./api:/app
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/cram_development
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY_BASE: development_secret_key_base
      DEVISE_JWT_SECRET_KEY: development_jwt_secret_key
    depends_on:
      - db
      - redis

  web:
    build: ./web
    command: npm run dev -- --host
    volumes:
      - ./web:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
